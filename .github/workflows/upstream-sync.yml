name: Upstream Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: custom
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/nextlevelbuilder/goclaw.git || true
          git fetch upstream
          git fetch origin main

      - name: Update main branch
        run: |
          git checkout -B main origin/main
          git merge --ff-only upstream/main
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git push origin main

      - name: Merge dev into custom
        id: merge
        run: |
          git checkout custom
          if git merge upstream/dev --no-edit; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Check if anything changed
        id: changes
        run: |
          if git diff --quiet origin/custom; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push clean merge
        if: steps.merge.outputs.status == 'clean' && steps.changes.outputs.changed == 'true'
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git push origin custom

      - name: Resolve conflicts with Claude
        if: steps.merge.outputs.status == 'conflict'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          allowed_tools: "Bash(git add:*),Bash(git commit:*),Bash(git diff:*),Bash(git status:*)"
          prompt: |
            You are resolving merge conflicts between upstream/dev and our fork's custom branch.

            ## Our Custom Architecture (PRESERVE COMPLETELY)

            ### Dual Migration System
            - `migrations/` — upstream migrations (numbered 000030, 000031, ...), tracked in `schema_migrations`
            - `custom-migrations/` — our independent migrations (numbered 001, 002, ...), tracked in `custom_schema_migrations`
            - `internal/upgrade/custom_migrate.go` — custom migration runner
            - `cmd/gateway_stores_pg.go` and `cmd/gateway_stores_sqlite.go` — contain our `RunCustomMigrations()` injection calls

            ### Knowledge Graph Extensions (NOT in upstream)
            - `internal/http/knowledge_graph_types_handlers.go` — custom entity/relation type CRUD
            - `internal/tools/knowledge_graph_mutate.go` — agent write access tool with permission toggle
            - `internal/knowledgegraph/extractor_prompt_dynamic.go` — dynamic extraction prompts
            - `internal/store/pg/knowledge_graph_types.go` — custom types store
            - `internal/store/pg/knowledge_graph_dedup.go` — KG deduplication
            - `ui/web/src/pages/builtin-tools/kg-mutate-settings-form.tsx` — mutate settings UI
            - `ui/web/src/pages/memory/kg-types-tab.tsx`, `kg-type-form-dialog.tsx` — type management UI
            - `ui/web/src/pages/memory/kg-dedup-dialog.tsx` — dedup dialog
            - `ui/web/src/pages/memory/kg-entity-form-dialog.tsx`, `kg-relation-form-dialog.tsx` — entity/relation forms
            - `ui/web/src/pages/memory/hooks/use-kg-types.ts` — types hook

            ### Custom Workflows
            - `.github/workflows/deploy.yml` — our deployment workflow
            - `.github/workflows/upstream-sync.yml` — this file

            ## Conflict Resolution Rules

            1. **`custom-migrations/` directory** — NEVER rename, renumber, move, or delete files. Our migrations are independent from upstream and never conflict with upstream numbering.

            2. **`internal/upgrade/version.go` → `RequiredSchemaVersion`** — set to the highest migration number from `migrations/` directory (upstream only). This tracks upstream migrations only. Our custom migrations have their own system and do NOT affect this value.

            3. **`cmd/gateway_stores_pg.go` and `cmd/gateway_stores_sqlite.go`** — preserve our `RunCustomMigrations()` calls. Integrate upstream changes around them.

            4. **KG files** — merge upstream KG improvements WITH our custom extensions. Do NOT drop custom types, mutate tool, dynamic prompts, or dedup. Both sides must be preserved.

            5. **Custom workflow files** — if upstream adds workflows, keep both. Do not overwrite `deploy.yml` or `upstream-sync.yml`.

            6. **i18n files** (`ui/web/src/i18n/locales/`) — preserve our custom translation keys while adding upstream new keys.

            7. **All other conflicts** — keep BOTH sides. Merge logically.

            ## Final Steps
            After resolving ALL conflicts:
            1. `git diff --check` — must show NO conflict markers
            2. `git add -A`
            3. `git commit -m "upstream-sync: merge upstream/dev with conflict resolution"`

      - name: Push resolved merge
        if: steps.merge.outputs.status == 'conflict'
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git push origin custom

  deploy:
    needs: sync
    if: always() && needs.sync.result == 'success' && needs.sync.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
